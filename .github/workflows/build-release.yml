name: Build and Release Agent Chrome MCP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, for example v1.0.30'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Prepare Chrome extension
        run: pnpm --filter agent-chrome-mcp-extension exec wxt prepare

      - name: Build shared package
        run: pnpm --filter agent-chrome-mcp-shared build

      - name: Test native bridge
        run: pnpm --filter agent-chrome-mcp test:ci

      - name: Test Chrome extension
        run: pnpm --filter agent-chrome-mcp-extension test

      - name: Build native bridge
        run: pnpm --filter agent-chrome-mcp build

      - name: Build Chrome extension
        run: pnpm --filter agent-chrome-mcp-extension build

      - name: Zip Chrome extension
        run: pnpm --filter agent-chrome-mcp-extension zip

      - name: Check npm package availability
        id: npm_packages
        run: |
          if npm view agent-chrome-mcp-shared@$(node -p "require('./packages/shared/package.json').version") version >/dev/null 2>&1; then
            echo "shared_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "shared_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if npm view agent-chrome-mcp@$(node -p "require('./app/native-server/package.json').version") version >/dev/null 2>&1; then
            echo "native_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "native_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify npm publishing token
        if: steps.npm_packages.outputs.shared_exists != 'true' || steps.npm_packages.outputs.native_exists != 'true'
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN is required because at least one npm package version is not published yet." >&2
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret." >&2
            echo "Required secret name: NPM_TOKEN" >&2
            exit 1
          fi

      - name: Configure npm auth
        if: steps.npm_packages.outputs.shared_exists != 'true' || steps.npm_packages.outputs.native_exists != 'true'
        run: npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"

      - name: Publish shared package to npm
        if: steps.npm_packages.outputs.shared_exists != 'true'
        run: pnpm --filter agent-chrome-mcp-shared publish --access public --no-git-checks

      - name: Prepare native package metadata for npm
        run: |
          node <<'NODE'
          const fs = require('fs');
          const nativePath = 'app/native-server/package.json';
          const shared = JSON.parse(fs.readFileSync('packages/shared/package.json', 'utf8'));
          const native = JSON.parse(fs.readFileSync(nativePath, 'utf8'));
          native.dependencies['agent-chrome-mcp-shared'] = shared.version;
          fs.writeFileSync(nativePath, `${JSON.stringify(native, null, 2)}\n`);
          NODE

      - name: Pack native bridge and verify npx entry
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/npm-pack
          pnpm --dir app/native-server pack --pack-destination "$PWD/release-artifacts/npm-pack"
          TARBALL="$(find release-artifacts/npm-pack -maxdepth 1 -name 'agent-chrome-mcp-*.tgz' -print -quit)"
          tar -xOf "${TARBALL}" package/package.json > release-artifacts/npm-pack/native-package.json
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('release-artifacts/npm-pack/native-package.json', 'utf8'));
          const shared = pkg.dependencies?.['agent-chrome-mcp-shared'];
          if (!shared || shared.startsWith('workspace:')) {
            throw new Error(`Packed native package has invalid shared dependency: ${shared}`);
          }
          if (!pkg.bin?.['agent-chrome-mcp']) {
            throw new Error('Packed native package is missing the agent-chrome-mcp bin');
          }
          console.log(`Packed ${pkg.name}@${pkg.version} depends on agent-chrome-mcp-shared@${shared}`);
          NODE

      - name: Publish native bridge to npm
        if: steps.npm_packages.outputs.native_exists != 'true'
        run: pnpm --filter agent-chrome-mcp publish --access public --no-git-checks

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          EXTENSION_ZIP="$(find app/chrome-extension/.output -maxdepth 1 -name '*.zip' -print -quit)"
          if [ -z "${EXTENSION_ZIP}" ]; then
            echo "No extension zip found in app/chrome-extension/.output" >&2
            exit 1
          fi
          cp "${EXTENSION_ZIP}" release-artifacts/agent-chrome-mcp-extension.zip
          cat > release-artifacts/agent-chrome-mcp-mcp-config.json <<'JSON'
          {
            "mcpServers": {
              "agent-chrome-mcp": {
                "command": "npx",
                "args": ["-y", "--registry=https://registry.npmjs.org", "agent-chrome-mcp@latest", "stdio"]
              }
            }
          }
          JSON

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Agent Chrome MCP ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-artifacts/agent-chrome-mcp-extension.zip
            release-artifacts/agent-chrome-mcp-mcp-config.json
          body: |
            ## Install

            1. Download `agent-chrome-mcp-extension.zip` from this release and unzip it.
            2. Open `chrome://extensions/` in Chrome.
            3. Enable Developer mode.
            4. Click Load unpacked and select the unzipped folder that contains `manifest.json`.
            5. Open the Agent Chrome MCP extension popup and click Copy Configuration.
            6. Paste this config into your agent MCP settings, then restart the agent:

            ```json
            {
              "mcpServers": {
                "agent-chrome-mcp": {
                  "command": "npx",
                  "args": ["-y", "--registry=https://registry.npmjs.org", "agent-chrome-mcp@latest", "stdio"]
                }
              }
            }
            ```

            7. After the agent restarts, open the extension popup and click Connect.

            Advanced global install:

            ```bash
            npm install -g agent-chrome-mcp
            ```

            ```json
            {
              "mcpServers": {
                "agent-chrome-mcp": {
                  "command": "agent-chrome-mcp",
                  "args": ["stdio"]
                }
              }
            }
            ```

            Advanced HTTP endpoint: `http://127.0.0.1:12307/mcp` after the extension starts the local bridge.
